[access_combined_wcookie]
LOOKUP-autolookup_prices = prices_lookup productId AS productId OUTPUTNEW price AS price product_name AS productName

[s4c:quotes]
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = csv
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%d
category = Custom
description = Comma-separated value format. Set header and other settings in "Delimited Settings"
disabled = false
pulldown_type = 1

[s4c:weather]
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE=none
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 10
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = dt
TIME_FORMAT = %s
category = Custom
description = wetterdaten
disabled = false
pulldown_type = true

[phyphox_json]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = time.now
category = Structured
description = "JSON data from Phyphox"
disabled = false
pulldown_type = true

[phyphox_metrics]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 18
METRIC-SCHEMA-TRANSFORMS = metric-schema:phyphox
NO_BINARY_CHECK = true
TIME_PREFIX = "now":
category = Log to Metrics
pulldown_type = 1
disabled = false
description = log2-metrics adapted for phyphox
METRIC-SCHEMA-MEASURES-phyphox = _ALLNUMS_

# ── s4c:meteo:historic ────────────────────────────────────────────────────────
# Daily historical weather for stock exchange cities → s4c_meteo_historic
# Fields: temperature_2m_max/min/mean, precipitation_sum, wind_speed_10m_max,
#         sunshine_duration, weather_code + city, country, exchange, timezone
# ──────────────────────────────────────────────────────────────────────────────

[s4c:meteo:historic]
SHOULD_LINEMERGE    = false
LINE_BREAKER        = ([\r\n]+)
NO_BINARY_CHECK     = true
INDEXED_EXTRACTIONS = csv
TIME_FORMAT         = %Y-%m-%d

# ── s4c:stocks:csv ────────────────────────────────────────────────────────────
# Static baseline stocks_history.csv → s4c_stocks (event index)
# ──────────────────────────────────────────────────────────────────────────────

[s4c:stocks:csv]
SHOULD_LINEMERGE    = false
LINE_BREAKER        = ([\r\n]+)
NO_BINARY_CHECK     = true
INDEXED_EXTRACTIONS = csv
TIME_FORMAT         = %Y-%m-%d

# ── s4c:stocks:json ────────────────────────────────────────────────────────────
# Daily updates from update_stocks.py → s4c_stocks (event index)
# ──────────────────────────────────────────────────────────────────────────────

[s4c:stocks:json]
SHOULD_LINEMERGE    = false
LINE_BREAKER        = ([\r\n]+)
NO_BINARY_CHECK     = true
INDEXED_EXTRACTIONS = json
TIME_PREFIX         = "_time":\"
TIME_FORMAT         = %Y-%m-%d

# ── open_meteo:weather:metric ─────────────────────────────────────────────────
# Flat JSON with  metric_name:meteo.<field>  keys → s4c_meteo_metrics
#
# INDEXED_EXTRACTIONS = JSON is required (not KV_MODE) so that metric_name:
# prefixed fields are visible to the metrics pipeline at index time.
# ──────────────────────────────────────────────────────────────────────────────

[open_meteo:weather:metric]
SHOULD_LINEMERGE         = false
LINE_BREAKER             = ([\r\n]+)
NO_BINARY_CHECK          = true
INDEXED_EXTRACTIONS      = JSON
TIMESTAMP_FIELDS         = _time
TIME_FORMAT              = %s
METRIC-SCHEMA-TRANSFORMS = metric-schema:open_meteo_weather

# ── open_meteo:weather:json ───────────────────────────────────────────────────
# Flat JSON with plain field names → s4c_meteo (events index)
# KV_MODE = json provides search-time field extraction.
# ──────────────────────────────────────────────────────────────────────────────

[open_meteo:weather:json]
SHOULD_LINEMERGE = false
LINE_BREAKER     = ([\r\n]+)
NO_BINARY_CHECK  = true
KV_MODE          = json
TIME_PREFIX      = "_time":
TIME_FORMAT      = %s
MAX_TIMESTAMP_LOOKAHEAD = 16

# ── open_meteo:weather:error ──────────────────────────────────────────────────

[open_meteo:weather:error]
SHOULD_LINEMERGE    = false
LINE_BREAKER        = ([\r\n]+)
NO_BINARY_CHECK     = true
INDEXED_EXTRACTIONS = JSON
TIMESTAMP_FIELDS    = _time
TIME_FORMAT         = %s
