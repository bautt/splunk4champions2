# Retention override for workshop indexes that hold historical data.
# The default frozenTimePeriodInSecs (~6 years) would silently drop
# records from 2016 when meteo_historic and stocks_history are indexed.

[s4c_meteo_historic]
frozenTimePeriodInSecs = 378691200

[s4c_stocks]
frozenTimePeriodInSecs = 378691200
