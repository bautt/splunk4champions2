# Workshop indexes: full path settings + long retention for historical CSV data.
# Retention: frozenTimePeriodInSecs = 12 years (378691200) for meteo + stock indices so
# 2016+ rows are not dropped by the default ~6y policy.

[s4c_weather]
coldPath = $SPLUNK_DB/s4c_weather1/colddb
enableDataIntegrityControl = 0
enableTsidxReduction = 0
homePath = $SPLUNK_DB/s4c_weather1/db
maxTotalDataSizeMB = 6000
thawedPath = $SPLUNK_DB/s4c_weather1/thaweddb

[s4c_stock_indices]
coldPath = $SPLUNK_DB/s4c_stock_indices1/colddb
enableDataIntegrityControl = 0
enableTsidxReduction = 0
homePath = $SPLUNK_DB/s4c_stock_indices1/db
maxTotalDataSizeMB = 3000
thawedPath = $SPLUNK_DB/s4c_stock_indices1/thaweddb
frozenTimePeriodInSecs = 378691200

[s4c_tutorial]
coldPath = $SPLUNK_DB/s4c_tutorial/colddb
enableDataIntegrityControl = 0
enableTsidxReduction = 0
homePath = $SPLUNK_DB/s4c_tutorial/db
